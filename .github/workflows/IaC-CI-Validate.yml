name: "IaC CI Validation pipeline"

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deployment:
    name: "Bicep quality and security scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Validate Bicep quality with bicep build
        run: bicep build --file ./Bicep/main.bicep 
      - name: run checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./Bicep
          framework: bicep
          soft_fail: false

      - name: Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CI_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_CI_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Validate
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: validate
          name: Dev-Validate-${{ github.run_id }}
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: Project-AzIaC
          template-file: ./Bicep/main.bicep
          validation-level: providerNoRbac
      - name: What-If
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: whatIf
          name: Dev-WhatIf-${{ github.run_id }}
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: Project-AzIaC
          template-file: ./Bicep/main.bicep
          validation-level: providerNoRbac